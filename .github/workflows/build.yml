name: Build Jar
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.1.1 # Фикс: используем стабильную версию
          
      - name: Build with Gradle
        run: gradle build
        
      - name: Upload Mod
        uses: actions/upload-artifact@v4
        with:
          name: Mod-by-bulkabonya
          path: build/libs/*.jar
